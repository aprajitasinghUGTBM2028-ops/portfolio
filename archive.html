<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprajita — Archive</title>

  <link rel="stylesheet" href="cat-buddy.css" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #F2F1EC;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F2F1EC;
    }

    /* 16:9 canvas that scales like background:contain */
    .canvas-16-9 {
      position: relative;
      aspect-ratio: 16 / 9;
      width: 100%;
      max-width: calc(100vh * 16 / 9);
      max-height: 100vh;
      margin: 0 auto;
      background: #F2F1EC url('images/archive-background.jpg') no-repeat center center;
      background-size: contain;
    }

    /* Project cards */
    .card {
      position: absolute;
      display: block;
      text-decoration: none;
      will-change: transform;
      transform-origin: center center;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Back arrow */
    .back-link {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #1E63FF;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      text-decoration: none;
      z-index: 1500;
      box-shadow: 0 4px 12px rgba(30, 99, 255, 0.25);
      transition: transform 0.2s ease-out;
    }
    .back-link:hover { transform: translateX(-4px); }
  </style>
</head>
<body>
  <a href="about.html" class="back-link" aria-label="Go back to about">&larr;</a>

  <div class="app-shell">
    <div class="canvas-16-9">

      <!-- Vintage computer — click opens Calendly -->
      <a class="card"
         href="https://calendly.com/aaprtpratimasingh/30min"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Book a 30-min call on Calendly"
         data-rotate="0"
         style="left:39%; top:21%; width:38%;">
        <img src="images/archive-computer.png" alt="Book a 30-min call on Calendly" />
      </a>

      <!-- Flavour Fellow case study -->
      <a class="card"
         href="pdfs/flavour-fellow-case-study.pdf"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Flavour Fellow case study"
         data-rotate="-6"
         style="left:0.5%; top:50%; width:16%;">
        <img src="images/card-flavour-fellow.png" alt="Flavour Fellow case study" />
      </a>

      <!-- Red String AI case study -->
      <a class="card"
         href="pdfs/red-string-ai-case-study.pdf"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Red String AI case study"
         data-rotate="4"
         style="left:19%; top:50%; width:16%;">
        <img src="images/card-red-string-ai.png" alt="Red String AI case study" />
      </a>

      <!-- RegenX case study -->
      <a class="card"
         href="pdfs/regenx-case-study.pdf"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="RegenX case study"
         data-rotate="3"
         style="left:83%; top:46%; width:16%;">
        <img src="images/card-regenx.png" alt="RegenX case study" />
      </a>

    </div>
  </div>

  <script>
    // Hover parallax — each card drifts toward the cursor while hovered.
    // Reads the base rotation from data-rotate and preserves it in the transform.
    (function initHoverParallax() {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      var intensity = 16;
      var cards = document.querySelectorAll('.card');

      cards.forEach(function (el) {
        var tx = 0, ty = 0, cx = 0, cy = 0, raf;
        var baseRot = parseFloat(el.getAttribute('data-rotate') || '0');

        function onMove(e) {
          var r = el.getBoundingClientRect();
          var nx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
          var ny = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
          tx = nx * intensity;
          ty = ny * intensity;
        }
        function onLeave() { tx = 0; ty = 0; }

        el.addEventListener('mousemove', onMove);
        el.addEventListener('mouseleave', onLeave);

        function tick() {
          cx += (tx - cx) * 0.12;
          cy += (ty - cy) * 0.12;
          el.style.transform =
            'translate3d(' + cx.toFixed(2) + 'px,' + cy.toFixed(2) + 'px,0) rotate(' + baseRot + 'deg)';
          raf = requestAnimationFrame(tick);
        }
        tick();
      });
    })();
  </script>

  <script src="cat-buddy.js"></script>
</body>
</html>
